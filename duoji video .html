<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>向雪岑品牌实操教学课程视频合集</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft Yahei",微软雅黑}
body{background:#f4f6f9;padding:20px max(10px,calc(50% - 600px))}
h1{text-align:center;margin-bottom:24px;color:#111;font-size:24px}
.box{background:#fff;border-radius:10px;padding:20px;box-shadow:0 1px 10px rgba(0,0,0,0.07)}
/* 播放器容器样式 */
#player_0dfa9e416c546b72{
    width:100%;
    border-radius:6px;
    background:#000;
    margin-bottom:20px;
    min-height:420px;
}
/* 课程列表通用样式 */
.list{display:grid;gap:10px;margin-bottom:15px}
.item{
    padding:12px 16px;
    border:1px solid #dde2ec;
    border-radius:6px;
    cursor:pointer;
    transition:0.2s ease;
}
.item:hover{background:#eef6ff;border-color:#3677f5}
.item.active{background:#e1edff;border-color:#2563eb}
.tips{color:#666;font-size:14px;text-align:center}
</style>
</head>
<body>
<h1>向雪岑品牌实操教学课程视频合集</h1>
<div class="box">
    <!-- 【固定播放器容器，不要修改ID】 -->
    <div id="player_0dfa9e416c546b72"></div>

    <!-- ====================== 仅在这里批量新增/删除视频 ====================== -->
    <!-- 复制一行<div class="item">，修改data-vcode和中间文字即可新增课程 -->
    <div class="list" id="videoList">
        <div class="item" data-vcode="0dfa9e416c546b72">实操教学 胶原</div>
        <div class="item" data-vcode="4c598532ac1e791e">实操教学 针清</div>
        <div class="item" data-vcode="3b8857d39186028d">胶原</div>
        <div class="item" data-vcode="d46c4358fee8c80c">向雪岑品牌视频</div>

        <!-- 有多少视频就复制多少行，上下拖动调整排序 -->
    </div>
    <!-- ====================================================================== -->

    <p class="tips">问题肌·学术派</p>
</div>

<!-- 多吉云官方播放SDK CDN，必须保留，不可本地下载 -->
<script type="text/javascript" src="https://player.dogecloud.com/js/loader"></script>
<script type="text/javascript">
// ====================== 全局固定配置（如需修改参数只改这里） ======================
const CONFIG = {
    userId: 15384,               // 你的多吉云用户ID
    containerId: 'player_0dfa9e416c546b72', // 播放器容器ID
    autoPlay: false              // 是否自动播放，false=关闭自动播放
};
// ==============================================================================

// 全局播放器实例，无需改动
let playerInstance = null;
const playerDom = document.getElementById(CONFIG.containerId);
const videoItemList = document.querySelectorAll('.item');

/**
 * 切换播放器统一函数，内部逻辑无需修改
 * @param {string} targetVcode 多吉云视频唯一vcode
 */
function switchVideo(targetVcode) {
    // 销毁上一个播放器，防止多层叠加
    if (playerInstance) {
        playerInstance.destroy();
        playerInstance = null;
    }
    // 完全沿用你提供的标准初始化代码
    playerInstance = new DogePlayer({
        container: playerDom,
        userId: CONFIG.userId,
        vcode: targetVcode,
        autoPlay: CONFIG.autoPlay
    });
}

// 页面加载默认播放第一条视频
if (videoItemList.length > 0) {
    const firstVcode = videoItemList[0].dataset.vcode;
    switchVideo(firstVcode);
    videoItemList[0].classList.add('active');
}

// 绑定所有视频点击切换事件（新增视频无需改此处JS，自动识别）
videoItemList.forEach(item => {
    item.addEventListener('click', function () {
        // 清除所有高亮
        videoItemList.forEach(ele => ele.classList.remove('active'));
        // 当前点击项高亮
        this.classList.add('active');
        // 切换视频
        const vcode = this.dataset.vcode;
        switchVideo(vcode);
    })
})
</script>
</body>
</html>
